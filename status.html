<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>نظام إدارة سلال رمضان — تتبع الطلب</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 50: '#f0faf5', 500: '#2d9f6e', 600: '#238258' } },       fontFamily: { arabic: ['"Amiri"', '"Noto Sans Arabic"', 'Tahoma', 'system-ui', 'sans-serif'], display: ['"Amiri"', 'Georgia', 'serif'] } } }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;600;700&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: oklch(98% 0.004 240); --surface: oklch(100% 0 0); --fg: oklch(20% 0.02 240); --muted: oklch(50% 0.018 240); --border: oklch(90% 0.006 240); --accent: oklch(56% 0.12 170); }
    .dark { --bg: #0f0f0f; --surface: #1a1a1a; --fg: #f0f0f0; --muted: #888; --border: #2a2a2a; }
    body { font-family: 'Amiri', 'Noto Sans Arabic', Tahoma, system-ui, sans-serif; }
    h1, h2, h3, .font-arabic { font-family: 'Amiri', 'Noto Sans Arabic', Georgia, serif; }
    .bg-mosque-fixed { background-image: url('mosque-bg.jpg'); background-size: 110% auto; background-position: center; background-repeat: no-repeat; background-attachment: fixed; animation: kenBurns 20s ease-in-out infinite alternate; }
    .bg-mosque-fixed::before { content: ''; position: fixed; inset: 0; background: linear-gradient(135deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.55) 100%); z-index: 0; }
    @keyframes kenBurns { 0% { background-size: 110% auto; background-position: center; } 100% { background-size: 130% auto; background-position: 60% 50%; } }
    .glass { background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); }
    .dark .glass { background: rgba(15,15,15,0.55); border-color: rgba(255,255,255,0.08); }
    .glass-strong { background: rgba(255,255,255,0.8); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.25); }
    .dark .glass-strong { background: rgba(15,15,15,0.7); border-color: rgba(255,255,255,0.08); }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    .text-shadow-lg { text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-mosque-fixed text-[var(--fg)] min-h-screen transition-colors duration-300 relative">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STATUS_MAP = {
      pending:      { label: 'قيد الانتظار', color: 'text-amber-600 dark:text-amber-400', bg: 'bg-amber-50 dark:bg-amber-900/20', border: 'border-amber-200', icon: 0 },
      approved:     { label: 'تمت الموافقة', color: 'text-green-600 dark:text-green-400', bg: 'bg-green-50 dark:bg-green-900/20', border: 'border-green-200', icon: 1 },
      rejected:     { label: 'مرفوض', color: 'text-red-600 dark:text-red-400', bg: 'bg-red-50 dark:bg-red-900/20', border: 'border-red-200', icon: 2 },
      received_basket: { label: 'تم الاستلام', color: 'text-blue-600 dark:text-blue-400', bg: 'bg-blue-50 dark:bg-blue-900/20', border: 'border-blue-200', icon: 3 },
    };

    const STATUS_STEPS = [
      { key: 'pending', label: 'قيد الانتظار' },
      { key: 'approved', label: 'تمت الموافقة' },
      { key: 'received_basket', label: 'استلام السلة' },
    ];

    function ThemeToggle({ dark, onToggle }) {
      return (
        <button onClick={onToggle}
          className="fixed top-4 start-4 z-50 w-10 h-10 rounded-xl glass flex items-center justify-center text-white/70 hover:text-white transition-all shadow-lg">
          {dark ? (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          ) : (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          )}
        </button>
      );
    }

    function TrackPage() {
      const [dark, setDark] = useState(() => { try { return localStorage.getItem('rm-dark') === 'true'; } catch { return false; } });
      const [nationalId, setNationalId] = useState('');
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        document.documentElement.classList.toggle('dark', dark);
        try { localStorage.setItem('rm-dark', dark); } catch {}
      }, [dark]);

      const handleSearch = async (e) => {
        e.preventDefault();
        if (!nationalId.trim() || nationalId.length < 10) { setError('يرجى إدخال رقم هوية صحيح (10 أرقام)'); return; }
        setError('');
        setLoading(true);
        try {
          const res = await fetch('/api/applications/track/' + encodeURIComponent(nationalId.trim()));
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error === 'No applications found for this National ID' ? 'لا يوجد طلب بهذا الرقم' : data.error || 'فشل البحث');
          }
          const data = await res.json();
          setResults(data.map(r => ({
            mosque: r.mosque_name,
            status: r.status,
            appliedDate: r.applied_date ? new Date(r.applied_date).toLocaleDateString('ar-SA') : '—',
            familySize: r.family_size,
            reviewDate: r.reviewed_at ? new Date(r.reviewed_at).toLocaleDateString('ar-SA') : null,
            basketReceivedDate: r.distribution_date ? new Date(r.distribution_date).toLocaleDateString('ar-SA') : null,
            notes: r.admin_notes
          })));
        } catch (err) {
          setError(err.message || 'فشل الاتصال بالخادم');
        }
        setLoading(false);
      };

      const getActiveStep = (status) => {
        return STATUS_STEPS.findIndex(s => s.key === status);
      };

      return (
        <div className="min-h-screen flex flex-col relative z-10">
          <header className="px-4 py-8 text-center">
            <a href="index.html" className="text-white/60 hover:text-white text-sm transition-colors drop-shadow-md">&larr; العودة</a>
            <h1 className="text-2xl font-bold mt-2 text-white text-shadow-lg">تتبع حالة الطلب</h1>
          </header>

          <div className="flex-1 max-w-2xl mx-auto w-full p-4 py-4 fade-in">
            <form onSubmit={handleSearch} className="glass-strong rounded-2xl shadow-xl p-6 mb-6">
              <label className="block text-sm font-medium text-[var(--muted)] mb-2">أدخل رقم الهوية الوطنية</label>
              <div className="flex gap-2">
                <input type="text" value={nationalId} onChange={e => setNationalId(e.target.value.replace(/\D/g, '').slice(0, 10))}
                  className="flex-1 px-4 py-2.5 rounded-xl bg-white/60 dark:bg-white/5 border border-white/30 dark:border-white/10 text-[var(--fg)] placeholder-[var(--muted)] focus:outline-none focus:ring-2 focus:ring-[var(--accent)] focus:border-transparent transition-all"
                  placeholder="١٠ أرقام" dir="ltr" maxLength={10} />
                <button type="submit" disabled={loading}
                  className="px-6 py-2.5 rounded-xl bg-[var(--accent)] text-white font-medium text-sm hover:opacity-90 transition-all disabled:opacity-50 flex items-center gap-2">
                  {loading && <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>}
                  بحث
                </button>
              </div>
              {error && <p className="text-red-500 text-xs mt-2">{error}</p>}
            </form>

            {results && results.map((app, i) => {
              const s = STATUS_MAP[app.status];
              const activeStep = getActiveStep(app.status);
              return (
                <div key={i} className="fade-in space-y-4">
                  <div className="glass-strong rounded-2xl shadow-xl p-6">
                    <div className="flex items-center justify-between mb-4">
                      <h2 className="text-lg font-semibold">{app.mosque}</h2>
                      <span className={`px-3 py-1 rounded-full text-xs font-semibold ${s.bg} ${s.color} border ${s.border}`}>{s.label}</span>
                    </div>

                    <div className="space-y-3 mb-6">
                      <div className="flex justify-between text-sm py-2 border-b border-[var(--border)] last:border-0">
                        <span className="text-[var(--muted)]">تاريخ التقديم</span>
                        <span>{app.appliedDate}</span>
                      </div>
                      <div className="flex justify-between text-sm py-2 border-b border-[var(--border)] last:border-0">
                        <span className="text-[var(--muted)]">عدد أفراد الأسرة</span>
                        <span>{app.familySize}</span>
                      </div>
                      {app.reviewDate && (
                        <div className="flex justify-between text-sm py-2 border-b border-[var(--border)] last:border-0">
                          <span className="text-[var(--muted)]">تاريخ المراجعة</span>
                          <span>{app.reviewDate}</span>
                        </div>
                      )}
                      {app.basketReceivedDate && (
                        <div className="flex justify-between text-sm py-2 border-b border-[var(--border)] last:border-0">
                          <span className="text-[var(--muted)]">تاريخ الاستلام</span>
                          <span className="text-green-600 font-medium">{app.basketReceivedDate}</span>
                        </div>
                      )}
                    </div>

                    <div className="relative">
                      <div className="absolute top-0 bottom-0 right-[11px] w-0.5 bg-[var(--border)]" />
                      <div className="space-y-6 relative">
                        {STATUS_STEPS.map((step, si) => {
                          const isActive = si <= activeStep;
                          const isCurrent = si === activeStep;
                          return (
                            <div key={step.key} className="flex items-center gap-3">
                              <div className={`relative z-10 w-6 h-6 rounded-full flex items-center justify-center shrink-0 ${
                                isActive ? 'bg-[var(--accent)]' : 'bg-[var(--border)]'
                              }`}>
                                {isActive && (
                                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"/>
                                  </svg>
                                )}
                              </div>
                              <div className={`text-sm ${isCurrent ? 'font-semibold text-[var(--fg)]' : isActive ? 'text-[var(--fg)]' : 'text-[var(--muted)]'}`}>
                                {step.label}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  <div className="text-center">
                    <a href="index.html" className="text-sm text-[var(--accent)] hover:underline font-medium">العودة لتسجيل الدخول</a>
                  </div>
                </div>
              );
            })}
          </div>
          <ThemeToggle dark={dark} onToggle={() => setDark(d => !d)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(TrackPage));
  </script>
</body>
</html>
